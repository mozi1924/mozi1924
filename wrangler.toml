name = "mozi1924"
pages_build_output_dir = "dist"
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "mozi1924-com"
database_id = "64533fc2-02dc-4a34-8260-f403751b028a" # Replace with actual database_id

[[kv_namespaces]]
binding = "SESSION"
id = "ce38259951d0496a9a8acfdd8bdfc646"

# Required secrets (set in Cloudflare Pages dashboard, not here):
# TURNSTILE_SECRET_KEY  - Cloudflare Turnstile secret
# EMAIL_API_KEY         - x-api-key for vercel-email-routing
# NOTIFY_FROM           - sender address bound to EMAIL_API_KEY
# NOTIFY_TO             - recipient address for comment notifications
# CF_ZONE_ID            - Cloudflare Zone ID for cache purging
# CF_API_TOKEN          - Cloudflare API Token with cache purge permission